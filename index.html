<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baseball Standings</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:   #0a1628;
      --grass:   #0d1f3c;
      --lime:    #ffffff;
      --chalk:   #ffffff;
      --dirt:    #cc0000;
      --red:     #cc0000;
      --bg:      #060e1e;
      --card:    #0d1a30;
      --border:  #1e3058;
      --text:    #e8edf5;
      --muted:   #8fa8cc;

      --nationals-red: #ab0003;
      --royals-blue:   #004687;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,.012) 40px, rgba(255,255,255,.012) 41px),
        repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,.012) 40px, rgba(255,255,255,.012) 41px);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    header {
      display: flex;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 36px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 20px;
    }

    .diamond-icon { width: 52px; height: 52px; flex-shrink: 0; }

    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 0.06em;
      color: var(--chalk);
      line-height: 1;
    }

    .header-text h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      letter-spacing: 0.08em;
      color: var(--lime);
      line-height: 1;
      margin-top: 4px;
    }

    .header-text p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 3px;
      text-transform: uppercase;
      transition: all .2s;
      align-self: center;
    }
    .refresh-btn:hover { border-color: var(--lime); color: var(--lime); }

    #status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      min-height: 1.2em;
    }
    #status.error { color: var(--red); }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.45);
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      background: var(--green);
      border-bottom: 2px solid var(--grass);
    }

    th {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--lime);
      padding: 13px 16px;
      text-align: center;
      white-space: nowrap;
    }
    th.team-col { text-align: left; }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: background .15s;
      animation: fadeRow .4s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(116,198,157,.06); }

    @keyframes fadeRow {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    td {
      padding: 13px 16px;
      font-size: 0.9rem;
      text-align: center;
      color: var(--text);
    }
    td.team-col {
      text-align: left;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--chalk);
    }

    .team-name-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team-swatch {
      width: 10px;
      height: 28px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      margin-right: 10px;
    }
    tbody tr:first-child .rank {
      background: var(--dirt);
      color: #fff;
    }

    td.pct { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; }
    td.gb  { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; color: var(--muted); }
    td.gb.leader { color: var(--lime); font-weight: 600; }
    td.wins { color: #cc0000; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
    td.loss { color: #e07070; font-family: 'IBM Plex Mono', monospace; }
    td.ties { font-family: 'IBM Plex Mono', monospace; color: var(--muted); }

    /* Skeleton */
    .skeleton-row td { padding: 13px 16px; }
    .skel {
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.04) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .footer {
      margin-top: 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: .6;
      text-align: right;
      letter-spacing: 0.06em;
    }

    @media (max-width: 520px) {
      th, td { padding: 10px 10px; font-size: 0.8rem; }
      td.team-col { font-size: 0.85rem; }
      .rank { width: 20px; height: 20px; font-size: 0.62rem; margin-right: 6px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <svg class="diamond-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="26" y="4" width="22" height="22" rx="2" transform="rotate(45 26 4)" fill="#0d1f3c" stroke="#ffffff" stroke-width="1.5"/>
      <circle cx="26" cy="26" r="5" fill="#cc0000" stroke="#ffffff" stroke-width="1.2"/>
      <circle cx="26" cy="10" r="3" fill="#ffffff"/>
      <circle cx="42" cy="26" r="3" fill="#ffffff"/>
      <circle cx="26" cy="42" r="3" fill="#ffffff"/>
      <circle cx="10"  cy="26" r="3" fill="#ffffff"/>
    </svg>
    <div class="header-text">
      <h1>Minor B Norwalk Little League</h1>
      <h2>Standings</h2>
      <p id="subtitle">Loading season data…</p>
    </div>
    <button class="refresh-btn" onclick="loadStandings()">↻ Refresh</button>
  </header>

  <div id="status"></div>

  <div class="table-wrap">
    <table id="standings-table">
      <thead>
        <tr id="header-row"></tr>
      </thead>
      <tbody id="table-body">
        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td></tr>
        <tr class="skeleton-row"><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td><td><div class="skel"></div></td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer" id="footer-note"></div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBebvkwmlXCFWWimZiv_1ktCU0SM_dHTUniVjFLsJ_wH5yicFg3YJ6C-D7SVFCA1P6zglWKC02JEWn/pub?gid=0&single=true&output=csv";

  // Team colour map — add more teams here as needed
  const TEAM_COLORS = {
    'nationals': '#ab0003',
    'royals':    '#004687',
  };

  function getTeamColor(name) {
    const key = (name || '').toLowerCase().trim();
    for (const [k, v] of Object.entries(TEAM_COLORS)) {
      if (key.includes(k)) return v;
    }
    return '#4a6080'; // default fallback colour
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n').map(l => l.replace(/\r/g, ''));
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = cols[i] ?? '');
      return obj;
    });
    return { headers, rows };
  }

  function findCol(headers, ...candidates) {
    for (const c of candidates) {
      const found = headers.find(h =>
        h.toLowerCase().replace(/[^a-z0-9]/g,'').includes(c.toLowerCase().replace(/[^a-z0-9]/g,''))
      );
      if (found) return found;
    }
    return null;
  }

  function calcGB(leaderW, leaderL, w, l) {
    return ((leaderW - w) + (l - leaderL)) / 2;
  }

  function formatPct(w, l, t = 0) {
    const g = parseInt(w) + parseInt(l) + parseInt(t);
    if (!g) return '.000';
    const p = (parseInt(w) + (parseInt(t) * 0.5)) / g;
    return p === 1 ? '1.000' : p.toFixed(3).replace('0.', '.');
  }

  async function loadStandings() {
    const status = document.getElementById('status');
    const body   = document.getElementById('table-body');
    const hrow   = document.getElementById('header-row');

    status.textContent = 'Fetching latest data…';
    status.className = '';

    body.innerHTML = Array(2).fill(
      `<tr class="skeleton-row">${Array(5).fill('<td><div class="skel"></div></td>').join('')}</tr>`
    ).join('');
    hrow.innerHTML = '';

    try {
      let text = null;
      let lastErr = null;

      const attempts = [
        () => fetch(CSV_URL + '&cachebust=' + Date.now(), { cache: 'no-store' }),
        () => fetch('https://corsproxy.io/?' + encodeURIComponent(CSV_URL)),
        () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL)),
      ];

      for (const attempt of attempts) {
        try {
          const res = await attempt();
          if (res.ok) { text = await res.text(); break; }
        } catch (e) { lastErr = e; }
      }

      if (!text) throw new Error(lastErr?.message || 'All fetch attempts failed. Make sure your sheet is published as CSV.');

      const { headers, rows } = parseCSV(text);
      if (!rows.length) throw new Error('No data rows found in sheet.');

      const clean   = h => h.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
      const teamCol = headers.find(h => ['team','name','club','organization'].includes(clean(h))) || headers[0];
      const wCol    = headers.find(h => ['w','wins','win'].includes(clean(h)));
      const lCol    = headers.find(h => ['l','loss','losses'].includes(clean(h)));
      const tCol    = headers.find(h => ['t','ties','tie','draw'].includes(clean(h))) || null;

      if (!teamCol || !wCol || !lCol)
        throw new Error('Could not find required W / L columns. Make sure columns are labelled W and L.');

      // Filter to only Nationals and Royals
      const filtered = rows.filter(r => {
        const name = (r[teamCol] || '').toLowerCase();
        return name.includes('national') || name.includes('royal');
      });

      if (!filtered.length)
        throw new Error('Could not find Nationals or Royals in the sheet. Check team names.');

      // Sort by wins desc, losses asc
      filtered.sort((a, b) => {
        const wDiff = parseInt(b[wCol]||0) - parseInt(a[wCol]||0);
        if (wDiff !== 0) return wDiff;
        return parseInt(a[lCol]||0) - parseInt(b[lCol]||0);
      });

      const leaderW = parseInt(filtered[0][wCol] || 0);
      const leaderL = parseInt(filtered[0][lCol] || 0);

      // Build header
      const colDefs = [
        { label: '#',    cls: '' },
        { label: 'Team', cls: 'team-col' },
        { label: 'W',    cls: '' },
        { label: 'L',    cls: '' },
        ...(tCol ? [{ label: 'T', cls: '' }] : []),
        { label: 'PCT',  cls: '' },
        { label: 'GB',   cls: '' },
      ];
      hrow.innerHTML = colDefs.map(c => `<th class="${c.cls}">${c.label}</th>`).join('');

      // Rank labels with tie support
      const rankLabels = [];
      filtered.forEach((row, i) => {
        const w = parseInt(row[wCol] || 0);
        const l = parseInt(row[lCol] || 0);
        if (i === 0) {
          rankLabels.push(1);
        } else {
          const prevW = parseInt(filtered[i-1][wCol] || 0);
          const prevL = parseInt(filtered[i-1][lCol] || 0);
          rankLabels.push(w === prevW && l === prevL ? rankLabels[i-1] : i + 1);
        }
      });
      const hasTiedRanks = rankLabels.some((r, i) => rankLabels.indexOf(r) !== i);

      // Build rows
      body.innerHTML = '';
      filtered.forEach((row, i) => {
        const w   = parseInt(row[wCol] || 0);
        const l   = parseInt(row[lCol] || 0);
        const t   = tCol ? (parseInt(row[tCol]) || 0) : 0;
        const gb  = i === 0 ? '—' : calcGB(leaderW, leaderL, w, l).toFixed(1);
        const pct = formatPct(w, l, t);

        const rankNum     = rankLabels[i];
        const isTied      = hasTiedRanks && rankLabels.filter(r => r === rankNum).length > 1;
        const rankDisplay = isTied ? 'T-' + rankNum : '' + rankNum;
        const isLeader    = rankNum === 1;
        const teamName    = row[teamCol] || '—';
        const color       = getTeamColor(teamName);

        const tr = document.createElement('tr');
        tr.style.animationDelay = (i * 80) + 'ms';

        tr.innerHTML =
          `<td><span class="rank" style="${isTied ? 'width:auto;padding:0 6px;border-radius:4px;font-size:0.62rem;' : ''}">${rankDisplay}</span></td>` +
          `<td class="team-col">
            <div class="team-name-wrap">
              <div class="team-swatch" style="background:${color};"></div>
              ${teamName}
            </div>
          </td>` +
          `<td class="wins">${w}</td>` +
          `<td class="loss">${l}</td>` +
          (tCol ? `<td class="ties">${t}</td>` : '') +
          `<td class="pct">${pct}</td>` +
          `<td class="gb ${isLeader ? 'leader' : ''}">${gb}</td>`;

        body.appendChild(tr);
      });

      status.textContent = `${filtered.length} teams · Updated ${new Date().toLocaleTimeString()}`;
      document.getElementById('subtitle').textContent = 'Spring 2026';
      document.getElementById('footer-note').textContent = `Source: Google Sheets · ${new Date().toLocaleDateString()}`;

    } catch (err) {
      status.textContent = `Error: ${err.message}`;
      status.className = 'error';
      body.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.8rem;">Could not load standings data.</td></tr>`;
      console.error(err);
    }
  }

  loadStandings();
</script>
</body>
</html>
